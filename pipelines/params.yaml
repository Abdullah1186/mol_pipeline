# Pipeline parameters for LOCAL CLI runs (`python -m pipelines.runner`).
# The deployed Streamlit UI does NOT read this file — it builds Params at
# runtime from widget state. The `inputs:` paths below are absolute paths
# on the author's laptop and will not exist inside the container.

# Which filters to AND together when deciding which molecules survive.
#   valid          - keep only RDKit-sanitisable molecules
#   unique         - keep first occurrence per SMILES (requires valid)
#   even_electrons - drop molecules with odd total electron count
filters:
  valid: true
  unique: true
  even_electrons: false

# Source DBs to process.
inputs:
  - { path: /Users/abdullah/Dev/MChem_DGMs/analysis/Databases/Gschnet_qm9.db, dataset: qm9, name: Gschnet_qm9 }
  - { path: /Users/abdullah/Dev/MChem_DGMs/analysis/Databases/EDM_qm9.db,     dataset: qm9, name: EDM_qm9 }
  - { path: /Users/abdullah/Dev/MChem_DGMs/analysis/Databases/GeoLDM_qm9.db,  dataset: qm9, name: GeoLDM_qm9 }
  - { path: /Users/abdullah/Dev/MChem_DGMs/analysis/Databases/JODO_qm9_raw.db, dataset: qm9, name: JODO_qm9 }

output_dir: .
metrics_csv: molecular_metrics.csv
artifacts_dir: artifacts
